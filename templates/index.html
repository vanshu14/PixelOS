<!DOCTYPE html>
<html>
<head>
<title>Mini ADAS</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}
select, button {
    padding: 10px;
    margin: 8px;
    font-size: 16px;
    border-radius: 6px;
}
button {
    background: #1e88e5;
    color: white;
    border: none;
    cursor: pointer;
}
button:disabled {
    background: #666;
}
#video {
    margin-top: 20px;
    width: 720px;
    border: 3px solid white;
}
</style>
</head>
<body>

<h2> Mini ADAS Dashboard</h2>

<label>Select a video:</label><br>
<select id="videoSelect">
    {% for v in videos %}
        <option value="{{ v }}">{{ v }}</option>
        
    {% endfor %}
   
</select><br>

<button onclick="startStream()">Start Processing</button>
<button onclick="stopStream()">Stop</button>

<div>
    <img id="video" src="">
</div>

<script>
function startStream() {
    const video = document.getElementById("videoSelect").value;

    fetch("/start", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ video })
    }).then(() => {
        document.getElementById("video").src = "/stream";
    });
}

function stopStream() {
    fetch("/stop");
    document.getElementById("video").src = "";
}
</script>

</body>
</html>
